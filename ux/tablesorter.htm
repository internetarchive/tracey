<html>
  <head>
    <title>Collections are special</title>
    <link rel="stylesheet" href="https://esm.ext.archive.org/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  </head>

  <body class="Unity">
    <table border="1" class="table table-striped Tablesort">
      <thead>
        <tr>
          <th>identifier</th>
          <th>access_restricted</th>
          <th>public_formats</th>
        </tr>
      </thead>
      <tbody>
        <tr><td>webwidecrawl</td><td>1</td><td>Metadata,DAT</td></tr>
        <tr><td>wide00000</td><td>1</td><td>Metadata,DAT</td></tr>
        <tr><td>wide00001</td><td>1</td><td>Metadata,DAT</td></tr>
        <tr><td>wide00002</td><td>1</td><td>Metadata,DAT</td></tr>
        <tr><td>yahoovideo2011</td><td>1</td><td>Metadata,DAT</td></tr>
        <tr><td>absenceofwax</td><td>0</td><td></td></tr>
        <tr><td>al_reves</td><td>0</td><td></td></tr>
        <tr><td>albertahomestead</td><td>0</td><td></td></tr>
        <tr><td>americana</td><td>0</td><td></td></tr>
        <tr><td>andersonuniversity</td><td>0</td><td></td></tr>
        <tr><td>browardcollege</td><td>0</td><td></td></tr>
      </tbody>
    </table>
  </body>

  <style>
    /* Tablesort column-sort indicators */
    th[role=columnheader] { cursor: pointer; }
    th[role=columnheader]::after  { content: '⬘'; opacity: 0.6; font-size: 150%; line-height: 0.9; }
    th[aria-sort="ascending"]::after  { content: '▲'; opacity: 1; font-size: 100%; line-height: 16px; }
    th[aria-sort="descending"]::after { content: '▼'; opacity: 1; font-size: 100%; line-height: 16px; }
  </style>

  <script type="module">
    import Tablesort from 'https://esm.ext.archive.org/tablesort'
    document.querySelectorAll('table.Tablesort').forEach((t) => new Tablesort(t))
  </script>
</html>
